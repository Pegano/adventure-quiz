name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "index.html,style.css,app.js,sw.js,manifest.json,icon-192.png,icon-512.png,gifs"
          target: /var/www/adventure-quiz/
          strip_components: 0

      - name: Set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod 644 /var/www/adventure-quiz/*.html /var/www/adventure-quiz/*.css /var/www/adventure-quiz/*.js
            echo "✅ quiz.wnkdata.nl deployed"
